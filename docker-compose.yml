version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: contract-reviewer:latest
    container_name: contract_reviewer_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - contract_reviewer_logs:/app/logs
    networks:
      - contract_reviewer_network
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: contract-reviewer:latest
    container_name: contract_reviewer_frontend
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - API_URL=http://backend:8000
    volumes:
      - contract_reviewer_logs:/app/logs
    networks:
      - contract_reviewer_network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M

  redis:
    image: redis:7-alpine
    container_name: contract_reviewer_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - contract_reviewer_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: contract_reviewer_qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - contract_reviewer_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Celery worker — offloads long-running LLM pipeline from Uvicorn event loop.
  # Dynamic scaling:
  #   --autoscale=MAX,MIN adjusts the internal thread pool per container based
  #   on queue depth. Start with 2 replicas for dev; scale via:
  #     docker-compose up --scale celery_worker=N
  # Production upgrade: replace replicas with a KEDA ScaledObject targeting
  #   the Redis list key "celery:broker:contract_review" for 0→N pod scaling.
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: contract-reviewer:latest
    command: >
      celery -A worker.celery_app worker
      --loglevel=info
      --queues=contract_review
      --autoscale=${CELERY_WORKER_MAX_CONCURRENCY:-4},${CELERY_WORKER_MIN_CONCURRENCY:-1}
      --pool=threads
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - contract_reviewer_logs:/app/logs
    networks:
      - contract_reviewer_network
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2048M
    healthcheck:
      test: ["CMD", "celery", "-A", "worker.celery_app", "inspect", "ping", "--timeout=5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  contract_reviewer_logs:
    name: contract_reviewer_logs
  redis_data:
    name: contract_reviewer_redis_data
  qdrant_data:
    name: contract_reviewer_qdrant_data

networks:
  contract_reviewer_network:
    name: contract_reviewer_network
    driver: bridge
