version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: contract-reviewer:latest
    container_name: contract_reviewer_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - contract_reviewer_logs:/app/logs
    networks:
      - contract_reviewer_network
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: contract-reviewer:latest
    container_name: contract_reviewer_frontend
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - contract_reviewer_logs:/app/logs
    networks:
      - contract_reviewer_network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M

  redis:
    image: redis:6.2-alpine
    container_name: contract_reviewer_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - contract_reviewer_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: contract_reviewer_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - contract_reviewer_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  contract_reviewer_logs:
    name: contract_reviewer_logs
  redis_data:
    name: contract_reviewer_redis_data
  qdrant_data:
    name: contract_reviewer_qdrant_data

networks:
  contract_reviewer_network:
    name: contract_reviewer_network
    driver: bridge
